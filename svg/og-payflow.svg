<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#06091a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(129,140,248,0.07)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="30%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(129,140,248,0.22)"/>
      <stop offset="100%" stop-color="rgba(129,140,248,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="65%" r="40%">
      <stop offset="0%" stop-color="rgba(34,211,238,0.14)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0)"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- top-left kicker badge -->
  <g transform="translate(80, 80)">
    <rect width="200" height="34" rx="17" fill="rgba(129,140,248,0.08)" stroke="rgba(129,140,248,0.3)"/>
    <circle cx="20" cy="17" r="4" fill="#818cf8"/>
    <text x="36" y="22" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#a78bfa" letter-spacing="2">CASE STUDY · 01</text>
  </g>

  <!-- main heading -->
  <text x="80" y="240" font-family="'Syne','Inter',sans-serif" font-weight="800" font-size="92" fill="#f0f0f0" letter-spacing="-3.5">PayFlow</text>
  <text x="80" y="320" font-family="'Syne','Inter',sans-serif" font-weight="700" font-size="44" fill="url(#grad)" letter-spacing="-1.5">End-to-end ETL pipeline</text>
  <text x="80" y="370" font-family="'Syne','Inter',sans-serif" font-weight="700" font-size="44" fill="url(#grad)" letter-spacing="-1.5">&amp; star schema warehouse.</text>

  <!-- subtitle -->
  <text x="80" y="430" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#8a8fa0" letter-spacing="0.5">Python · SQL · PostgreSQL · SQLAlchemy</text>

  <!-- bottom signature -->
  <g transform="translate(80, 555)">
    <text x="0" y="0" font-family="'Syne',sans-serif" font-weight="700" font-size="22" fill="#f0f0f0" letter-spacing="-0.5">Yomi Ismail</text>
    <text x="0" y="26" font-family="'IBM Plex Mono',monospace" font-size="12" fill="#818cf8" letter-spacing="2">DATA ENGINEER · SUFFOLK, UK</text>
  </g>

  <!-- right-side: star schema motif (5 dots in star pattern) -->
  <g transform="translate(950, 305)" opacity="0.95">
    <!-- spokes -->
    <line x1="0" y1="0" x2="0" y2="-130" stroke="rgba(129,140,248,0.35)" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="123" y2="-40" stroke="rgba(129,140,248,0.35)" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="76" y2="105" stroke="rgba(129,140,248,0.35)" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-76" y2="105" stroke="rgba(129,140,248,0.35)" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-123" y2="-40" stroke="rgba(129,140,248,0.35)" stroke-width="1.5"/>

    <!-- dimensions -->
    <g>
      <circle cx="0" cy="-130" r="22" fill="#06091a" stroke="#818cf8" stroke-width="2"/>
      <text x="0" y="-126" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#a78bfa" letter-spacing="0.5">DIM</text>
    </g>
    <g>
      <circle cx="123" cy="-40" r="22" fill="#06091a" stroke="#818cf8" stroke-width="2"/>
      <text x="123" y="-36" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#a78bfa" letter-spacing="0.5">DIM</text>
    </g>
    <g>
      <circle cx="76" cy="105" r="22" fill="#06091a" stroke="#818cf8" stroke-width="2"/>
      <text x="76" y="109" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#a78bfa" letter-spacing="0.5">DIM</text>
    </g>
    <g>
      <circle cx="-76" cy="105" r="22" fill="#06091a" stroke="#818cf8" stroke-width="2"/>
      <text x="-76" y="109" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#a78bfa" letter-spacing="0.5">DIM</text>
    </g>
    <g>
      <circle cx="-123" cy="-40" r="22" fill="#06091a" stroke="#818cf8" stroke-width="2"/>
      <text x="-123" y="-36" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#a78bfa" letter-spacing="0.5">DIM</text>
    </g>

    <!-- fact (centre, larger, filled) -->
    <circle cx="0" cy="0" r="34" fill="#818cf8"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#06091a" font-weight="700" letter-spacing="0.5">FACT</text>
  </g>

  <!-- right-side label under the schema -->
  <text x="950" y="490" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#606880" letter-spacing="2">STAR SCHEMA · 4 DIMS · 1 FACT</text>

  <!-- bottom border accent -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#grad)"/>
</svg>
